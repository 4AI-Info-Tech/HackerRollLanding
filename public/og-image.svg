    </g>
    <text x="0" y="500" fill="#F2F4F8" font-family="'Instrument Sans', system-ui, sans-serif" font-size="28" font-weight="700">hackerroll<tspan fill="#6DE4FF">.</tspan>com</text>
  </g>
