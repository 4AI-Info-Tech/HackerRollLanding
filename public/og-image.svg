      <circle cx="9" cy="9" r="9" fill="#FF6B3D"/>
    </g>
    <text x="30" y="15" fill="#9AA2B6" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18" font-weight="600" letter-spacing="5">ON AIR DAILY</text>
    <text x="0" y="140" fill="#F2F4F8" font-family="'Instrument Sans', system-ui, sans-serif" font-size="92" font-weight="700">See the news.</text>
    <text x="0" y="232" fill="#9AA2B6" font-family="'Instrument Sans', system-ui, sans-serif" font-size="92" font-weight="700">Don't just read it.</text>
    <text x="0" y="306" fill="#7A8298" font-family="'Inter Tight', system-ui, sans-serif" font-size="30">Daily headlines rendered into short vertical video and stills.</text>
